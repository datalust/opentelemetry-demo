# extra settings to be merged into OpenTelemetry Collector configuration
# do not delete this file

## Example configuration for sending data to your own OTLP HTTP backend
## Note: the spanmetrics exporter must be included in the exporters array
## if overriding the traces pipeline.
##
exporters:
  otlp_http/example:
    traces_endpoint: http://seq:5341/ingest/otlp/v1/traces
    metrics_endpoint: http://seq:5341/ingest/otlp/v1/metrics
    logs_endpoint: http://seq:5341/ingest/otlp/v1/logs

service:
  pipelines:
    traces:
      exporters: [span_metrics, otlp_http/example, debug]
    metrics:
      exporters: [otlp_http/example, debug]
    logs:
      exporters: [otlp_http/example, debug]
